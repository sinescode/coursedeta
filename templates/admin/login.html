{% extends "base.html" %}

{% block title %}Admin Login - EduPortal{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8 sm:mt-12 px-4">
    <div class="bg-white rounded-2xl shadow-2xl p-6 sm:p-8">
        <div class="text-center mb-6">
            <i class="fas fa-lock text-5xl text-indigo-500 mb-3"></i>
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">Admin Login</h1>
            <p class="text-gray-600 text-sm sm:text-base">Enter your password to continue</p>
        </div>

        <form method="POST">
            <div class="mb-5">
                <label class="block text-gray-700 font-medium mb-2 text-sm">
                    <i class="fas fa-key mr-1"></i> Password
                </label>
                <input type="password" name="password" 
                       class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
                       placeholder="Enter admin password" required autofocus>
            </div>
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition transform hover:scale-[1.02]">
                <i class="fas fa-sign-in-alt mr-2"></i> Login
            </button>
        </form>


        </div>
    </div>
</div>
{% endblock %}
